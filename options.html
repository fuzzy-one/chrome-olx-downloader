<!DOCTYPE html>
<html>

<head>
    <title>OLX Downloader Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background-color: #002f34;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00424a;
        }

        #status {
            margin-top: 10px;
            color: green;
            display: none;
        }
    </style>
</head>

<body>
    <h2>OLX Downloader Settings</h2>

    <div class="form-group">
        <label for="baseDir">Base Download Directory:</label>
        <p style="font-size: 12px; color: #666; margin-top: 0;">Files will be saved to: <strong>Downloads/&lt;Base
                Directory&gt;/&lt;Ad Name&gt;</strong></p>
        <input type="text" id="baseDir" placeholder="e.g. OLX_Downloads" />
    </div>

    <button id="saveBtn">Save</button>
    <div id="status">Settings saved!</div>

    <script src="options.js"></script>
</body>

</html>
